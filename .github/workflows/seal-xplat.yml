name: seal-xplat
on:
  push:
  workflow_dispatch:
jobs:
  tests:
    name: tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.8', '3.9', '3.10', '3.11', 'pypy-3.8']
        flask: ['flask<2.3', 'flask>=2.3']
        exclude:
          # Python 3.8 and PyPy 3.8 have no arm64 macOS build (macos-latest is
          # arm64), so setup-python cannot provision them there. They stay in
          # the matrix for ubuntu/windows.
          - os: macos-latest
            python: '3.8'
          - os: macos-latest
            python: 'pypy-3.8'
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      # Resolve deps as of the 4.8.0 release date so CI reproduces the
      # release-era environment. Live PyPI pulls Werkzeug 3.1+, which removed
      # werkzeug.__version__ that the 2023 test suite references — an
      # environment drift, not a real regression. tox forwards this via
      # `passenv = PIP_INDEX_URL` in tox.ini.
      PIP_INDEX_URL: https://:2023-04-27@time-machines-pypi.sealsecurity.io/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip wheel
      - run: pip install tox tox-gh-actions
      - run: tox
        env:
          FLASK_VERSION: ${{ matrix.flask }}
